version: 2
updates:
  # Root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "*-dev"
          - "*-test"
      development-dependencies:
        patterns:
          - "*-dev"
          - "*-test"

  # Example app
  - package-ecosystem: "npm"
    directory: "/examples/AnalyticsReactNativeExample"
    schedule:
      interval: "weekly"
    groups:
      example-dependencies:
        patterns:
          - "*"

  # E2E apps
  - package-ecosystem: "npm"
    directory: "/examples/E2E-compat"
    schedule:
      interval: "weekly"
    groups:
      e2e-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/examples/E2E-latest"
    schedule:
      interval: "weekly"
    groups:
      e2e-dependencies:
        patterns:
          - "*"

  # E2E CLI
  - package-ecosystem: "npm"
    directory: "/e2e-cli"
    schedule:
      interval: "weekly"
    groups:
      e2e-cli-dependencies:
        patterns:
          - "*"

  # Bundler (Ruby dependencies)
  - package-ecosystem: "bundler"
    directory: "/examples/E2E-compat"
    schedule:
      interval: "weekly"
    groups:
      ruby-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/examples/E2E-latest"
    schedule:
      interval: "weekly"
    groups:
      ruby-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/examples/AnalyticsReactNativeExample"
    schedule:
      interval: "weekly"
    groups:
      ruby-dependencies:
        patterns:
          - "*"
