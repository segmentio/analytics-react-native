version: 2
updates:
  # Root workspace - SDK dependencies only
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      production-dependencies:
        patterns:
          - '*'
        exclude-patterns:
          - '*-dev'
          - '*-test'
      development-dependencies:
        patterns:
          - '*-dev'
          - '*-test'
