version: 2
updates:
  # GitHub Actions - pin and group all action updates together
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      actions:
        patterns:
          - '*'

  # Root workspace (monorepo packages)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      all-dependencies:
        patterns:
          - '*'

  # Examples and tooling - group all into single PR per directory
  - package-ecosystem: 'npm'
    directory: '/examples/AnalyticsReactNativeExample'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      all-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/examples/E2E-compat'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      all-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/examples/E2E-latest'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      all-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/e2e-cli'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      all-dependencies:
        patterns:
          - '*'
