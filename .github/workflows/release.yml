name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - dry-run
          - beta
          - production

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0
      - name: Install dependencies
        run: devbox run ci:install
      - name: Lint (eslint)
        run: devbox run lint
      - name: Lint (formatting)
        run: devbox run format-check
      - name: Build
        run: devbox run build
      - name: Typecheck
        run: devbox run typecheck
      - name: Test
        run: devbox run test

  release:
    name: Release (${{ inputs.type }})
    needs: [ci]
    runs-on: ubuntu-latest
    environment: Publish
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Point beta branch at current commit
        if: inputs.type == 'beta'
        run: |
          git checkout -B beta HEAD
          git push origin beta --force

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0

      - name: Release (dry-run)
        if: inputs.type == 'dry-run'
        run: devbox run release-dry-run
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Release (beta)
        if: inputs.type == 'beta'
        run: devbox run -e GITHUB_REF=refs/heads/beta release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Release (production)
        if: inputs.type == 'production'
        run: devbox run release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Apps
        if: inputs.type == 'production'
        run: devbox run update-apps
